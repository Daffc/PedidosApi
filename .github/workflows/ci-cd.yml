name: Testes Automáticos

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION_FILE: "PedidosApi.sln"
  CONFIGURATION: "Release"

jobs:
  test:
    name: 🧪 Testes Automáticos
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐦 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true

      - name: 🔧 Restaurar pacotes
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: 🏗️ Build da solução
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: 🧪 Executar todos os testes
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --no-restore
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
        env:
          ConnectionStrings__DefaultConnection: "Data Source=:memory:"

      - name: 📊 Publicar resultados dos testes
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/
          retention-days: 14

      - name: 📈 Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/coverage.cobertura.xml
            **/coverage.opencover.xml
          retention-days: 14

      - name: 🗂️ Comentar cobertura no PR (apenas PRs)
        if: github.event_name == 'pull_request'
        uses: danielpalme/ReportGenerator-GitHub-Action@5.3.8
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: coveragereport
          reporttypes: HtmlInline_AzurePipelines;Cobertura
          github_token: ${{ secrets.GITHUB_TOKEN }}
